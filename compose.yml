services:
  tigerbeetle-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        if [ ! -f /data/0_0.tigerbeetle ]; then
          /tigerbeetle format --cluster=1 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
        else
          echo "already formatted: 0_0"
        fi
    restart: "no"
    security_opt:
      - seccomp=unconfined
    volumes:
      - tigerbeetle-data:/data

  # Single replica on a fixed-IP bridge network. TB's --addresses= does not
  # resolve DNS, so the IP is hardcoded.
  tigerbeetle-0:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    command: start --addresses=172.30.0.10:3000 /data/0_0.tigerbeetle
    restart: unless-stopped
    cap_add: [ IPC_LOCK ]
    security_opt: [ seccomp=unconfined ]
    networks:
      tdw-net:
        ipv4_address: 172.30.0.10
    volumes:
      - tigerbeetle-data:/data
    depends_on:
      tigerbeetle-init:
        condition: service_completed_successfully

  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      tigerbeetle-0:
        condition: service_started
    # TB's Zig client uses io_uring for TCP; Docker's default seccomp blocks it.
    security_opt:
      - seccomp=unconfined
    environment:
      POSTGRES_DB: tdw
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      - tdw-net
    command:
      - postgres
      - -c
      - shared_preload_libraries=tdw
      - -c
      - max_connections=1024
      - -c
      - tdw.tb_addr=172.30.0.10:3000
      - -c
      - tdw.tb_cluster_id=1
    ports:
      - "28819:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d tdw" ]
      interval: 1s
      timeout: 3s
      retries: 60

  # One-shot: smoke + pgbench. Run via
  #   docker compose run --rm bench
  # Override params via env:
  #   CLIENTS=64 DURATION=30 JOBS=8 PROGRESS=5 docker compose run --rm bench
  bench:
    image: postgres:18-bookworm
    profiles: [ "bench" ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tdw-net
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: tdw
      PGUSER: postgres
      CLIENTS: "${CLIENTS:-200}"
      DURATION: "${DURATION:-120}"
      JOBS: "${JOBS:-64}"
      PROGRESS: "${PROGRESS:-10}"
    volumes:
      - ./sql:/sql:ro
    entrypoint: [ "/bin/bash", "-eu", "-o", "pipefail", "-c" ]
    command:
      - |
        echo "== smoke =="
        psql -v ON_ERROR_STOP=1 -f /sql/smoke.sql
        echo
        echo "== seeding bench accounts =="
        psql -v ON_ERROR_STOP=1 -f /sql/bench_setup.sql
        echo
        echo "== pgbench  c=$$CLIENTS  j=$$JOBS  T=$${DURATION}s  progress=$${PROGRESS}s =="
        pgbench -n -c "$$CLIENTS" -j "$$JOBS" -T "$$DURATION" \
                --progress "$$PROGRESS" \
                -f /sql/bench_transfer.sql

networks:
  tdw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  tigerbeetle-data:
