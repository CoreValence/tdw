services:
  tigerbeetle-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /data/0_0.tigerbeetle ]; then
          /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
        else
          echo "already formatted"
        fi
    restart: "no"
    security_opt:
      - seccomp=unconfined
    volumes:
      - tigerbeetle-data:/data

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    command: start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    security_opt:
      - seccomp=unconfined
    ports:
      - "3000:3000"
    volumes:
      - tigerbeetle-data:/data
    depends_on:
      tigerbeetle-init:
        condition: service_completed_successfully

  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      tigerbeetle:
        condition: service_started
    # TB's Zig client uses io_uring for TCP; Docker's default seccomp blocks it.
    security_opt:
      - seccomp=unconfined
    environment:
      POSTGRES_DB: beetle
      POSTGRES_HOST_AUTH_METHOD: trust
      BEETLE_TB_ADDR: tigerbeetle:3000
      BEETLE_TB_CLUSTER_ID: "0"
    command:
      - postgres
      - -c
      - shared_preload_libraries=beetle
      - -c
      - max_connections=1024
    ports:
      - "28819:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d beetle"]
      interval: 1s
      timeout: 3s
      retries: 60

  # One-shot: smoke + pgbench. Run via
  #   docker compose run --rm bench
  # Override params via env:
  #   CLIENTS=64 DURATION=30 JOBS=8 docker compose run --rm bench
  bench:
    image: postgres:18-bookworm
    profiles: ["bench"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: beetle
      PGUSER: postgres
      CLIENTS: "${CLIENTS:-128}"
      DURATION: "${DURATION:-15}"
      JOBS: "${JOBS:-4}"
    volumes:
      - ./sql:/sql:ro
    entrypoint: ["/bin/bash", "-eu", "-o", "pipefail", "-c"]
    command:
      - |
        echo "== smoke =="
        psql -v ON_ERROR_STOP=1 -f /sql/smoke.sql
        echo
        echo "== seeding bench accounts =="
        psql -v ON_ERROR_STOP=1 -f /sql/bench_setup.sql
        echo
        echo "== pgbench  c=$$CLIENTS  j=$$JOBS  T=$${DURATION}s =="
        pgbench -n -c "$$CLIENTS" -j "$$JOBS" -T "$$DURATION" \
                -f /sql/bench_transfer.sql

volumes:
  tigerbeetle-data:
