name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        pg: [ 15, 16, 17, 18 ]
        arch: [ amd64, arm64 ]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg }} dev headers
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-server-dev-${{ matrix.pg }} \
            build-essential libclang-dev clang pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Export ZIG_PATH
        run: echo "ZIG_PATH=$(which zig)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: pg${{ matrix.pg }}-${{ matrix.arch }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-pgrx@0.18.0

      # Zig's libtb_client.a is compiled with initial-exec TLS
      # (R_X86_64_TPOFF32 relocations), which cannot be linked into a -shared
      # cdylib on x86_64 by any Linux linker. Zig exposes no TLS model knob
      # for static libs, so we link the dynamic libtb_client.so instead and
      # ship it alongside beetle.so with $ORIGIN rpath. aarch64 accepts the
      # equivalent TLS relocations from the static archive, so arm64 is
      # unaffected (tested: arm64 static link succeeds).
      - name: Patch sys crate to link dynamically (amd64)
        if: matrix.arch == 'amd64'
        run: |
          cargo fetch
          CRATE_DIR=$(find "$HOME/.cargo/registry/src" -maxdepth 2 -type d \
            -name 'tigerbeetle-unofficial-sys-*' | head -1)
          test -n "$CRATE_DIR"
          sed -i 's|cargo:rustc-link-lib=static=tb_client|cargo:rustc-link-lib=dylib=tb_client|' \
            "$CRATE_DIR/build.rs"
          grep -n 'cargo:rustc-link-lib=dylib=tb_client' "$CRATE_DIR/build.rs"

      - name: Package
        env:
          PGRX_PG_CONFIG_PATH: /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
          # $ORIGIN rpath lets the Postgres loader find libtb_client.so next to
          # beetle.so (amd64 only; arm64 stays static). Harmless on arm64 but
          # scoped for clarity.
          RUSTFLAGS: ${{ matrix.arch == 'amd64' && '-C link-arg=-Wl,-rpath,$ORIGIN' || '' }}
        run: |
          cargo pgrx package \
            --no-default-features \
            --features pg${{ matrix.pg }} \
            --pg-config /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config

      - name: Stage libtb_client.so next to beetle.so (amd64)
        if: matrix.arch == 'amd64'
        run: |
          TB_SO=$(find target/release/build -name 'libtb_client.so' \
            -path '*x86_64-linux-gnu*' | head -1)
          test -n "$TB_SO"
          cp "$TB_SO" \
            target/release/beetle-pg${{ matrix.pg }}/usr/lib/postgresql/${{ matrix.pg }}/lib/
          ls -la \
            target/release/beetle-pg${{ matrix.pg }}/usr/lib/postgresql/${{ matrix.pg }}/lib/

      - name: Read version
        id: version
        run: |
          version=$(awk -F'"' '/^version/{print $2; exit}' Cargo.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Tarball
        id: tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PG: ${{ matrix.pg }}
          ARCH: ${{ matrix.arch }}
        run: |
          NAME="beetle-${VERSION}-pg${PG}-linux-${ARCH}"
          mkdir -p dist
          tar czf "dist/${NAME}.tar.gz" -C "target/release/beetle-pg${PG}" .
          (cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.tarball.outputs.name }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches tag
        run: |
          VER=$(awk -F'"' '/^version/{print $2; exit}' Cargo.toml)
          if [ "v${VER}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${VER}" >&2
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
