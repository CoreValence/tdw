name: ci

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - '.gitignore'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        pg: [ 15, 16, 17, 18 ]
    runs-on: ubuntu-latest
    env:
      PGRX_PG_CONFIG_PATH: /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg }} dev headers
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-server-dev-${{ matrix.pg }} \
            build-essential libclang-dev clang pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Export ZIG_PATH
        run: echo "ZIG_PATH=$(which zig)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: lint-pg${{ matrix.pg }}

      - name: cargo fmt
        if: matrix.pg == 18
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --no-default-features --features pg${{ matrix.pg }}
          --all-targets -- -D warnings

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
